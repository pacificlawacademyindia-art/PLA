<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PU Law Entrance 2026 — 50 Power One-Liners</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C8102E;
    --red-light: #fff0f2;
    --red-mid: #f8d0d6;
    --ink: #1a1008;
    --ink2: #3d2b1f;
    --paper: #faf8f4;
    --cream: #f2ede3;
    --gold: #b8922a;
    --gold-light: #f7f0de;
    --border: #e0d8cc;
    --legal: #1a3a5c;
    --legal-bg: #e8f0f8;
    --const: #1a4d2e;
    --const-bg: #e8f5ec;
    --gk: #4a2060;
    --gk-bg: #f3eafa;
    --current: #7a3500;
    --current-bg: #fff3e8;
  }

  body {
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  .hero {
    background: var(--ink);
    color: #fff;
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 18px,
      rgba(200,16,46,0.06) 18px,
      rgba(200,16,46,0.06) 19px
    );
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 1.1rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 0.6rem;
  }
  .hero h1 span { color: var(--red); }
  .hero p {
    color: rgba(255,255,255,0.55);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }
  .hs { text-align: center; }
  .hs-n { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--red); }
  .hs-l { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── Filter bar ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 1.4rem 2rem;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .fb {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    color: var(--ink2);
    transition: all 0.15s;
  }
  .fb:hover { border-color: var(--red); color: var(--red); }
  .fb.active { background: var(--red); border-color: var(--red); color: #fff; }

  /* ── Main content ── */
  .main { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 2.5rem 0 1rem;
  }
  .section-label::before {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-label span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink2);
    opacity: 0.6;
    white-space: nowrap;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Card ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.2rem;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 42px 1fr auto;
    align-items: start;
    gap: 12px;
    transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    animation: fadeUp 0.3s ease both;
  }
  .card:hover {
    box-shadow: 0 3px 18px rgba(200,16,46,0.1);
    border-color: var(--red-mid);
    transform: translateY(-1px);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700;
  }
  .card-num.legal  { background: var(--legal-bg);   color: var(--legal); }
  .card-num.const  { background: var(--const-bg);   color: var(--const); }
  .card-num.gk     { background: var(--gk-bg);      color: var(--gk); }
  .card-num.current{ background: var(--current-bg); color: var(--current); }

  .card-text {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    font-weight: 400;
  }
  .card-text .k {
    color: var(--red);
    font-weight: 500;
    border-bottom: 1.5px solid var(--red-mid);
    padding-bottom: 1px;
  }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 2px;
    white-space: nowrap;
    align-self: start;
  }
  .card-tag.legal  { background: var(--legal-bg);   color: var(--legal); }
  .card-tag.const  { background: var(--const-bg);   color: var(--const); }
  .card-tag.gk     { background: var(--gk-bg);      color: var(--gk); }
  .card-tag.current{ background: var(--current-bg); color: var(--current); }

  /* ── Footer ── */
  .foot {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: rgba(26,16,8,0.35);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }
  .foot strong { color: var(--red); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">PU Law Entrance 2026</div>
  <h1>50 Power <span>One-Liners</span></h1>
  <p>Pattern-analysed from 3 years of previous papers · Focus on highlighted keywords</p>
  <div class="hero-stats">
    <div class="hs"><div class="hs-n">20</div><div class="hs-l">Legal aptitude</div></div>
    <div class="hs"><div class="hs-n">10</div><div class="hs-l">Constitution</div></div>
    <div class="hs"><div class="hs-n">15</div><div class="hs-l">Static GK</div></div>
    <div class="hs"><div class="hs-n">5</div><div class="hs-l">Current affairs</div></div>
  </div>
</header>

<nav class="filters">
  <button class="fb active" onclick="filter('all',this)">All 50</button>
  <button class="fb" onclick="filter('legal',this)">Legal aptitude</button>
  <button class="fb" onclick="filter('const',this)">Constitution</button>
  <button class="fb" onclick="filter('gk',this)">Static GK</button>
  <button class="fb" onclick="filter('current',this)">Current affairs</button>
</nav>

<main class="main" id="main"></main>

<footer class="foot">
  Revised for <strong>PU Law Entrance 2026</strong> · Panjab University, Chandigarh · Read highlighted words first
</footer>

  {n:21, cat:'const',   text:'The <span class="k">Preamble</span> declares India a <span class="k">Sovereign, Socialist, Secular, Democratic Republic</span>; "Socialist" &amp; "Secular" added by the <span class="k">42nd Amendment, 1976</span>.'},

  {n:42, cat:'gk',      text:'<span class="k">NITI Aayog</span> replaced the <span class="k">Planning Commission</span> in <span class="k">2015</span>; it functions as a <span class="k">policy think-tank</span>.'},
  {n:43, cat:'gk',      text:'The <span class="k">Right to Information Act, 2005</span> empowers citizens to access information from public authorities within <span class="k">30 days</span>.'},
  {n:44, cat:'gk',      text:'India became the <span class="k">first country to land near the Moon\'s south pole</span> with <span class="k">Chandrayaan-3\'s Vikram lander</span> in <span class="k">August 2023</span>.'},
  {n:45, cat:'gk',      text:'The <span class="k">Prevention of Money Laundering Act (PMLA), 2002</span> is enforced by the <span class="k">Enforcement Directorate (ED)</span>.'},

  {n:46, cat:'current', text:'<span class="k">Bharatiya Nyaya Sanhita (BNS), 2023</span> replaced the <span class="k">Indian Penal Code 1860</span>; came into force on <span class="k">1 July 2024</span>.'},
  {n:47, cat:'current', text:'<span class="k">Bharatiya Nagarik Suraksha Sanhita (BNSS)</span> replaced <span class="k">CrPC</span>; <span class="k">Bharatiya Sakshya Adhiniyam (BSA)</span> replaced the <span class="k">Indian Evidence Act</span>.'},
  {n:48, cat:'current', text:'Union Budget <span class="k">2025–26</span> focused on <span class="k">infrastructure, tax reform</span>, and the vision of <span class="k">Viksit Bharat by 2047</span>.'},
  {n:49, cat:'current', text:'<span class="k">ICC Champions Trophy 2025</span> hosted by Pakistan (India\'s matches in <span class="k">Dubai</span>); <span class="k">India won</span> the tournament.'},
  {n:50, cat:'current', text:'<span class="k">COP29 (2024, Baku, Azerbaijan)</span>: developed nations pledged <span class="k">$300 billion/year</span> in climate finance to developing nations by <span class="k">2035</span>.'},
];

const labels = {
  legal:   'Legal Aptitude',
  const:   'Constitution',
  gk:      'Static GK',
  current: 'Current Affairs'
};

let active = 'all';

function filter(cat, btn) {
  active = cat;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('main');
  const filtered = active === 'all' ? items : items.filter(i => i.cat === active);
  const groups = {};
  filtered.forEach(i => { if (!groups[i.cat]) groups[i.cat] = []; groups[i.cat].push(i); });

  container.innerHTML = Object.entries(groups).map(([cat, list]) => `
    <div class="section-label"><span>${labels[cat]}</span></div>
    ${list.map((item, idx) => `
      <div class="card" style="animation-delay:${idx * 0.04}s">
        <div class="card-num ${cat}">${item.n}</div>
        <div class="card-text">${item.text}</div>
        <div class="card-tag ${cat}">${cat === 'const' ? 'Const.' : labels[cat].split(' ')[0]}</div>
      </div>
    `).join('')}
  `).join('');
}

render();
</script>
</body>
</html>
