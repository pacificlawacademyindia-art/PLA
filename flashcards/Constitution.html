<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLA – Constitution 50 Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2A4A;--dark:#0a1628;--gold:#C8922A;--gl:#e8b84b;
  --gp:rgba(200,146,42,0.13);--gb:rgba(200,146,42,0.35);
  --txt:#fff;--sub:#a0b8cc;--bl:#8eb4d4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);font-family:'Source Sans 3',sans-serif;color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(200,146,42,0.05) 0%,transparent 60%);}

/* HEADER */
.hdr{position:relative;z-index:10;padding:14px 30px 12px;
  border-bottom:1px solid rgba(200,146,42,0.2);
  background:rgba(10,22,40,0.97);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:10px;}
.lb{width:34px;height:34px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:14px;font-weight:900;color:var(--gold);position:relative;}
.lb::before{content:'';position:absolute;inset:3px;border:1px solid rgba(200,146,42,0.3);}
.ln{font-family:'Playfair Display',serif;font-size:14px;font-weight:900;color:var(--gold);letter-spacing:2px;}
.ls{font-size:9px;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.hr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.ht{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;}
.pb{width:160px;height:3px;background:rgba(255,255,255,0.08);}
.pf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gl));transition:width 0.4s;}
.pt{font-size:9px;color:var(--sub);text-align:right;}

/* FILTER BAR */
.fbar{position:relative;z-index:9;padding:8px 30px;
  background:rgba(10,22,40,0.95);border-bottom:1px solid rgba(200,146,42,0.1);
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.fl{font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-right:4px;}
.fb{background:transparent;border:1px solid rgba(200,146,42,0.2);color:var(--sub);
  padding:3px 10px;font-size:10px;letter-spacing:1px;font-weight:700;cursor:pointer;
  text-transform:uppercase;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
.fb:hover{border-color:var(--gold);color:var(--gold);}
.fb.on{background:var(--gold);color:var(--dark);border-color:var(--gold);}

/* STAGE */
.stage{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:22px 14px 100px;}

/* CARD */
.cs{width:880px;max-width:96vw;perspective:1200px;cursor:pointer;}
.cf{width:100%;position:relative;transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(0.4,0.2,0.2,1);min-height:500px;}
.cs.flipped .cf{transform:rotateY(180deg);}
.face{backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:2.5px solid var(--gold);box-shadow:0 16px 50px rgba(0,0,0,0.6);
  display:flex;flex-direction:column;overflow:hidden;}
@media(min-width:601px){.face{position:absolute;inset:0;}}
@media(max-width:600px){
  .cf{transform-style:flat;transition:none;min-height:unset;}
  .cs.flipped .cf{transform:none;}
  .front{display:flex;}.bk{display:none;}
  .cs.flipped .front{display:none;}
  .cs.flipped .bk{display:flex;}
}
.front{background:var(--navy);}
.bk{transform:rotateY(180deg);background:#122038;}
@media(max-width:600px){.bk{transform:none;}}
.face::before{content:'';position:absolute;top:0;left:0;width:130px;height:130px;
  border-bottom-right-radius:100%;background:rgba(200,146,42,0.09);}
.face::after{content:'';position:absolute;bottom:0;right:0;width:110px;height:110px;
  border-top-left-radius:100%;background:rgba(200,146,42,0.05);}
.gl{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gl),var(--gold));}

/* FRONT LAYOUT */
.fh{display:flex;justify-content:space-between;align-items:flex-start;
  padding:16px 26px 0;position:relative;z-index:2;}
.fbr{font-family:'Playfair Display',serif;font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;}
.fn{font-family:'Playfair Display',serif;font-size:46px;font-weight:900;color:rgba(200,146,42,0.14);line-height:1;}
.fb2{flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px 26px 4px;position:relative;z-index:2;}
.ff{display:flex;justify-content:space-between;align-items:center;padding:0 26px 12px;position:relative;z-index:2;}
.tag{display:inline-block;background:var(--gp);border:1px solid var(--gb);
  color:var(--gold);font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:3px 11px;margin-bottom:11px;width:fit-content;}
.cq{font-size:11.5px;font-weight:700;color:var(--bl);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:11px;line-height:1.5;}
.ca{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;line-height:1.4;}
.ca .h{color:var(--gold);}
.dv{width:44px;height:2px;background:var(--gold);margin:9px 0;}
.dt{font-size:12px;color:var(--sub);line-height:1.72;}
.dt strong{color:var(--gold);font-weight:700;}
.fe{font-size:9px;letter-spacing:2px;color:#2a3d55;text-transform:uppercase;font-weight:700;}
.fr{font-size:9px;color:#2a3d55;font-weight:600;letter-spacing:1px;}
.fh2{font-size:9px;color:rgba(200,146,42,0.35);letter-spacing:2px;text-transform:uppercase;
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:3;pointer-events:none;}

/* BACK */
.bh{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 0;position:relative;z-index:2;}
.bl{font-size:9.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;}
.bb{flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:6px 26px 10px;position:relative;z-index:2;overflow-y:auto;}

/* TABLE */
.ct{width:100%;border-collapse:collapse;font-size:11.5px;font-family:'Source Sans 3',sans-serif;}
.ct th{background:rgba(200,146,42,0.18);color:var(--gold);font-weight:700;padding:5px 7px;
  text-align:left;border:1px solid rgba(200,146,42,0.2);}
.ct td{padding:5px 7px;color:#c0d4e4;border:1px solid rgba(255,255,255,0.05);vertical-align:top;line-height:1.4;}
.ct tr:nth-child(even) td{background:rgba(255,255,255,0.025);}
.ct .h{color:var(--gold);font-weight:700;}

/* INFO GRID */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px;}
.ib{background:var(--gp);border:1px solid var(--gb);padding:10px 12px;position:relative;}
.ib::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);}
.il{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.iv{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px;}
.is{font-size:11px;color:var(--sub);line-height:1.45;}

/* KNOWN */
.kb2{position:absolute;top:10px;right:10px;background:rgba(40,167,69,0.2);
  border:1px solid rgba(40,167,69,0.5);color:#5cb85c;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;z-index:5;display:none;}
.cs.known .kb2{display:block;}
.cs.known .face{border-color:rgba(92,184,92,0.4);}

/* CONTROLS */
.ctrl{display:flex;align-items:center;gap:14px;margin-top:18px;position:relative;z-index:1;}
@media(max-width:600px){
  .ctrl{position:fixed;bottom:0;left:0;right:0;margin-top:0;
    background:rgba(8,18,32,0.98);border-top:1px solid rgba(200,146,42,0.15);
    padding:8px 14px 14px;gap:8px;z-index:50;justify-content:space-between;}
  .kbh{display:none;}
  .ig{grid-template-columns:1fr;}
  .fb2{padding:6px 14px 4px;}
  .bb{padding:6px 14px 8px;}
  .fh,.bh{padding:12px 14px 0;}
  .ff{padding:0 14px 10px;}
  .ca{font-size:17px;}
  .dt{font-size:11px;}
  .hdr{padding:12px 14px;}
  .fbar{padding:8px 14px;}
}
.cb{background:transparent;border:1.5px solid var(--gb);color:var(--gold);
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;font-size:17px;}
.cb:hover:not(:disabled){background:var(--gold);color:var(--dark);}
.cb:disabled{opacity:0.25;cursor:not-allowed;}
.cc{display:flex;flex-direction:column;align-items:center;gap:6px;}
.cn{font-family:'Playfair Display',serif;font-size:13px;color:var(--sub);}
.cn strong{color:var(--gold);font-size:19px;}
.ca2{display:flex;gap:6px;}
.ab{border:1.5px solid;padding:4px 10px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
.ak{border-color:rgba(92,184,92,0.5);color:#5cb85c;background:rgba(92,184,92,0.08);}
.ak:hover{background:rgba(92,184,92,0.2);}
.af{border-color:var(--gb);color:var(--bl);background:transparent;}
.af:hover{background:rgba(142,180,212,0.1);}
.as{border-color:var(--gb);color:var(--gold);background:transparent;}
.as:hover{background:var(--gp);}
.kbh{margin-top:10px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.kk{display:flex;align-items:center;gap:4px;font-size:9px;color:#2a3d55;letter-spacing:1px;}
.ky{border:1px solid #1a2d40;background:rgba(255,255,255,0.03);padding:1px 6px;font-size:9px;color:#3a5060;}
@keyframes ci{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cs{animation:ci 0.3s ease both;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="lb">P</div>
    <div><div class="ln">PACIFIC LAW ACADEMY</div><div class="ls">PU BA.LLB 2026 · Constitution of India — 50 Flash Cards</div></div>
  </div>
  <div class="hr">
    <div class="ht">Constitution Master Deck · 50 Cards</div>
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    <div class="pt"><span id="kc">0</span> known / <span id="tc">50</span> total</div>
  </div>
</div>

<div class="fbar">
  <span class="fl">Topic:</span>
  <button class="fb on" onclick="setT('all',this)">All</button>
  <button class="fb" onclick="setT('Schedules',this)">Schedules</button>
  <button class="fb" onclick="setT('Parts',this)">Parts</button>
  <button class="fb" onclick="setT('History',this)">History</button>
  <button class="fb" onclick="setT('Amendments',this)">Amendments</button>
  <button class="fb" onclick="setT('Fundamental Rights',this)">FR</button>
  <button class="fb" onclick="setT('DPSP',this)">DPSP/FD</button>
  <button class="fb" onclick="setT('Key Articles',this)">Key Articles</button>
  <button class="fb" onclick="setT('Emergency',this)">Emergency</button>
</div>

<div class="stage">
  <div class="cs" id="cs" onclick="flip()">
    <div class="kb2">✓ KNOWN</div>
    <div class="cf" id="cf">
      <div class="face front">
        <div class="fh"><div class="fbr">Pacific Law Academy</div><div class="fn" id="fn"></div></div>
        <div class="fb2" id="fb2"></div>
        <div class="ff"><div class="fe">PU BA.LLB · CLAT · AILET</div><div class="fr" id="fr"></div></div>
        <div class="gl"></div><div class="fh2">TAP TO FLIP ↻</div>
      </div>
      <div class="face bk">
        <div class="bh"><div class="bl" id="blb"></div><div class="fn" id="bn" style="font-size:36px;"></div></div>
        <div class="bb" id="bb"></div>
        <div class="ff"><div class="fe">PU BA.LLB · CLAT · AILET</div><div class="fr" id="br"></div></div>
        <div class="gl"></div><div class="fh2">TAP TO GO BACK ↻</div>
      </div>
    </div>
  </div>
  <div class="ctrl">
    <button class="cb" id="pb" onclick="nav(-1)">&#8592;</button>
    <div class="cc">
      <div class="cn"><strong id="ci">1</strong> / <span id="ct2">50</span></div>
      <div class="ca2">
        <button class="ab af" onclick="flip()">↻ Flip</button>
        <button class="ab ak" onclick="mk()">✓ Known</button>
        <button class="ab as" onclick="sh()">⇌ Shuffle</button>
      </div>
    </div>
    <button class="cb" id="nb" onclick="nav(1)">&#8594;</button>
  </div>
  <div class="kbh">
    <div class="kk"><span class="ky">←→</span> Navigate</div>
    <div class="kk"><span class="ky">Space</span> Flip</div>
    <div class="kk"><span class="ky">K</span> Known</div>
    <div class="kk"><span class="ky">S</span> Shuffle</div>
  </div>
</div>

<script>
const D=[
// ══════════════════════════════════════════
// HISTORY (1–8)
// ══════════════════════════════════════════
{n:"01",t:"History",tag:"History of Constitution — Making",ref:"CAC · Constituent Assembly",
q:"When was the Constituent Assembly formed? Who drafted the Constitution?",
a:`CA formed: <span class='h'>Dec 1946</span>. Drafting Committee headed by <span class='h'>Dr. B.R. Ambedkar</span>. Adopted: <span class='h'>26 Nov 1949</span>. In force: <span class='h'>26 Jan 1950</span>.`,
dt:`<strong>CA members:</strong> 389 total (reduced to 299 after Partition). <strong>Sessions:</strong> 11 sessions over 2 yrs 11 months 18 days. <strong>Cost:</strong> ₹6.4 crore. <strong>Trap:</strong> Constitution was adopted on 26 Nov 1949 but came into force on 26 Jan 1950 — Republic Day. 26 Nov = Constitution Day (since 2015).`,
bl:"Constituent Assembly Key Facts",
bk:`<table class='ct'><tr><th>Fact</th><th>Detail</th></tr>
<tr><td class='h'>Constituent Assembly formed</td><td>December 1946 (Cabinet Mission Plan)</td></tr>
<tr><td class='h'>First session</td><td>9 December 1946 (President: Sachidananda Sinha — pro tem)</td></tr>
<tr><td class='h'>Permanent President</td><td>Dr. Rajendra Prasad</td></tr>
<tr><td class='h'>Drafting Committee Chairman</td><td>Dr. B.R. Ambedkar ("Father of Constitution")</td></tr>
<tr><td class='h'>Total sessions</td><td>11 sessions over 2 yrs 11 months 18 days</td></tr>
<tr><td class='h'>Adopted on</td><td>26 November 1949 (Constitution Day)</td></tr>
<tr><td class='h'>Came into force</td><td>26 January 1950 (Republic Day)</td></tr>
<tr><td class='h'>Original articles</td><td>395 Articles, 8 Schedules, 22 Parts</td></tr>
<tr><td class='h'>Current articles</td><td>~470 Articles, 12 Schedules, 25 Parts</td></tr></table>`,
br:"History of Constitution"},

{n:"02",t:"History",tag:"Preamble of Constitution",ref:"Constitution — Preamble",
q:"What does the Preamble declare India to be? Which Amendment added Secular & Socialist?",
a:`India = <span class='h'>Sovereign Socialist Secular Democratic Republic</span>. "Socialist" & "Secular" added by <span class='h'>42nd Amendment 1976</span>.`,
dt:`<strong>Preamble objectives:</strong> Justice (Social, Economic, Political) | Liberty (Thought, Expression, Belief, Faith, Worship) | Equality (Status, Opportunity) | Fraternity (Dignity, Unity & Integrity). <strong>Trap:</strong> Preamble is NOT enforceable in court (Berubari Union case 1960). But it is part of Constitution (Kesavananda Bharati 1973).`,
bl:"Preamble Deep Dive",
bk:`<div class='dt'><strong>Full Preamble key words:</strong><br>"WE, THE PEOPLE OF INDIA, having solemnly resolved to constitute India into a <strong>SOVEREIGN SOCIALIST SECULAR DEMOCRATIC REPUBLIC</strong> and to secure to all its citizens: JUSTICE, LIBERTY, EQUALITY, FRATERNITY..."<br><br><strong>Kesavananda Bharati (1973):</strong> Preamble IS part of Constitution — can be amended subject to basic structure.<br><strong>Berubari Union (1960):</strong> Preamble NOT enforceable as law by itself.<br><strong>42nd Amendment 1976:</strong> Added "Socialist," "Secular," and "Integrity."<br><br><strong>Trap:</strong> Preamble mentions "WE THE PEOPLE" — sovereign power rests with people, not Parliament or President.</div>`,
br:"Preamble · Art. 13"},

{n:"03",t:"History",tag:"Sources of Indian Constitution",ref:"Comparative Constitutional Law",
q:"Name 5 key sources of the Indian Constitution and what was borrowed from each",
a:`UK: Cabinet govt, PM, Parliament | USA: <span class='h'>FR, Judicial Review, Impeachment</span> | Ireland: <span class='h'>DPSP</span> | Canada: <span class='h'>Federation + residuary powers</span> | Germany: <span class='h'>Suspension of FR during Emergency</span>`,
dt:`<strong>Australia:</strong> Concurrent List, freedom of trade. <strong>USSR (now Russia):</strong> Fundamental Duties (FD). <strong>South Africa:</strong> Procedure for Constitutional amendment. <strong>Japan:</strong> Procedure established by law (Art. 21). <strong>France:</strong> Republic, Liberty-Equality-Fraternity.`,
bl:"Sources of Constitution — Full Table",
bk:`<table class='ct'><tr><th>Country</th><th>Borrowed Provision</th></tr>
<tr><td class='h'>UK (Britain)</td><td>Parliamentary govt, Cabinet system, PM, Rule of Law, Bicameralism, Writ system, Single citizenship</td></tr>
<tr><td class='h'>USA</td><td>Fundamental Rights, Judicial Review, Impeachment, Removal of SC/HC judges, Preamble concept</td></tr>
<tr><td class='h'>Ireland</td><td>Directive Principles of State Policy (DPSP), Method of election of President, Nomination of RS members</td></tr>
<tr><td class='h'>Canada</td><td>Federal system with strong centre, Residuary powers with Centre, Advisory jurisdiction of SC</td></tr>
<tr><td class='h'>Germany (Weimar)</td><td>Suspension of Fundamental Rights during Emergency</td></tr>
<tr><td class='h'>Australia</td><td>Concurrent List, Freedom of inter-state trade, Joint sitting of Parliament</td></tr>
<tr><td class='h'>USSR/Russia</td><td>Fundamental Duties (42nd Amendment)</td></tr>
<tr><td class='h'>South Africa</td><td>Procedure for amendment of Constitution</td></tr>
<tr><td class='h'>Japan</td><td>Procedure established by law</td></tr></table>`,
br:"Comparative Constitutional Law"},

{n:"04",t:"History",tag:"Basic Structure Doctrine",ref:"Kesavananda Bharati 1973",
q:"What is the Basic Structure Doctrine? Which case established it?",
a:`<span class='h'>Kesavananda Bharati v. State of Kerala (1973)</span> — Parliament cannot amend the BASIC STRUCTURE of the Constitution even under Art. 368.`,
dt:`<strong>Basic Structure includes:</strong> Supremacy of Constitution | Republican & Democratic form | Secular character | Separation of powers | Federal character | Unity & Integrity | Judicial review | Rule of Law | Free & fair elections | Independence of judiciary | Art. 32 (right to constitutional remedy). <strong>Trap:</strong> 13-judge bench — largest in SC history. 7:6 majority.`,
bl:"Basic Structure — Key Cases",
bk:`<table class='ct'><tr><th>Case</th><th>Year</th><th>Held</th></tr>
<tr><td class='h'>Shankari Prasad</td><td>1951</td><td>Parliament can amend FR — Art. 368 includes FR</td></tr>
<tr><td class='h'>Sajjan Singh</td><td>1965</td><td>Reaffirmed Shankari Prasad</td></tr>
<tr><td class='h'>Golak Nath</td><td>1967</td><td>Parliament CANNOT amend FR (overruled Shankari)</td></tr>
<tr><td class='h'>Kesavananda Bharati</td><td>1973</td><td>Parliament can amend FR but NOT basic structure</td></tr>
<tr><td class='h'>Minerva Mills</td><td>1980</td><td>Judicial review is basic structure; struck down 42nd Amend. clauses</td></tr>
<tr><td class='h'>Indra Sawhney</td><td>1992</td><td>50% cap on reservations; creamy layer</td></tr>
<tr><td class='h'>S.R. Bommai</td><td>1994</td><td>Federalism is basic structure; President's Rule subject to JR</td></tr></table>`,
br:"Art. 368 · Constitutional Amendment"},

{n:"05",t:"History",tag:"Constitutional History — Key Dates",ref:"History of Indian Constitution",
q:"Timeline: Morley-Minto to Republic — key dates every student must know",
a:`1909: <span class='h'>Morley-Minto Reforms</span> | 1919: <span class='h'>Montague-Chelmsford</span> | 1935: <span class='h'>Govt of India Act</span> | 1946: <span class='h'>Cabinet Mission</span> | 1950: <span class='h'>Republic</span>`,
dt:`<strong>GOI Act 1935:</strong> Largest source of Indian Constitution — federal structure, emergency provisions, judiciary, public service commissions. <strong>Trap:</strong> Ambedkar called Indian Constitution a "bag borrowed from various sources." 250+ provisions directly from GOI Act 1935.`,
bl:"Constitutional Timeline",
bk:`<table class='ct'><tr><th>Year</th><th>Event</th><th>Significance</th></tr>
<tr><td class='h'>1858</td><td>Govt of India Act</td><td>Crown takes over from East India Company</td></tr>
<tr><td class='h'>1861</td><td>Indian Councils Act</td><td>First legislative councils established</td></tr>
<tr><td class='h'>1909</td><td>Morley-Minto Reforms</td><td>Communal representation introduced</td></tr>
<tr><td class='h'>1919</td><td>Montague-Chelmsford</td><td>Dyarchy; bicameral legislature</td></tr>
<tr><td class='h'>1935</td><td>Govt of India Act</td><td>Federal structure; largest source of Indian Constitution</td></tr>
<tr><td class='h'>1946</td><td>Cabinet Mission Plan</td><td>Constituent Assembly established</td></tr>
<tr><td class='h'>26 Nov 1949</td><td>Constitution adopted</td><td>Constitution Day</td></tr>
<tr><td class='h'>26 Jan 1950</td><td>Constitution in force</td><td>Republic Day; India becomes Republic</td></tr></table>`,
br:"Constitutional History"},

{n:"06",t:"History",tag:"Committees of Constituent Assembly",ref:"Constituent Assembly",
q:"Name the key committees of the Constituent Assembly and their chairpersons",
a:`Drafting Committee: <span class='h'>Dr. B.R. Ambedkar</span> | Union Powers: <span class='h'>Jawaharlal Nehru</span> | Union Constitution: <span class='h'>Nehru</span> | Provincial Constitution: <span class='h'>Sardar Patel</span> | Fundamental Rights: <span class='h'>Sardar Patel</span>`,
dt:`<strong>Advisory Committee:</strong> Sardar Vallabhbhai Patel (FR, minorities, tribal areas). <strong>Steering Committee:</strong> Dr. Rajendra Prasad. <strong>Rules Committee:</strong> Dr. Rajendra Prasad. <strong>Trap:</strong> Jawaharlal Nehru moved the Objectives Resolution on 13 Dec 1946 — became basis of Preamble.`,
bl:"CA Committees",
bk:`<table class='ct'><tr><th>Committee</th><th>Chairman</th><th>Function</th></tr>
<tr><td class='h'>Drafting Committee</td><td>Dr. B.R. Ambedkar</td><td>Drafted the Constitution</td></tr>
<tr><td class='h'>Union Powers Committee</td><td>Jawaharlal Nehru</td><td>Centre's legislative powers</td></tr>
<tr><td class='h'>Union Constitution Committee</td><td>Jawaharlal Nehru</td><td>Central executive + legislature</td></tr>
<tr><td class='h'>Provincial Constitution Committee</td><td>Sardar Patel</td><td>State constitutions</td></tr>
<tr><td class='h'>Advisory Committee (FR)</td><td>Sardar Patel</td><td>Fundamental Rights + minorities</td></tr>
<tr><td class='h'>Steering Committee</td><td>Dr. Rajendra Prasad</td><td>Overall coordination</td></tr>
<tr><td class='h'>Rules Committee</td><td>Dr. Rajendra Prasad</td><td>Rules of procedure</td></tr>
<tr><td class='h'>Finance &amp; Staff Committee</td><td>Dr. Rajendra Prasad</td><td>Finance of CA</td></tr></table>`,
br:"Constituent Assembly History"},

{n:"07",t:"History",tag:"Nature of Indian Constitution",ref:"Constitutional Law",
q:"Is India's Constitution federal or unitary? Key characteristics?",
a:`India = <span class='h'>Quasi-Federal</span> (federal in structure, unitary in spirit). K.C. Wheare called it "Quasi-federal." Sir Ivor Jennings: "Federal Constitution with strong unitary features."`,
dt:`<strong>Federal features:</strong> Dual govt | Bicameralism | Division of powers | Written Constitution | Rigid amendment | Independent judiciary | Supremacy of Constitution. <strong>Unitary features:</strong> Single citizenship | Integrated judiciary | All-India Services | Emergency provisions | Residuary powers with Centre | Appointment of Governors by President.`,
bl:"Federal vs Unitary Features",
bk:`<table class='ct'><tr><th>Federal Features</th><th>Unitary Features</th></tr>
<tr><td>Dual govt (Centre + States)</td><td>Single Constitution</td></tr>
<tr><td>Written Constitution</td><td>Single citizenship</td></tr>
<tr><td>Division of powers (3 lists)</td><td>Integrated judiciary (SC apex)</td></tr>
<tr><td>Independent judiciary</td><td>All-India Services (IAS, IPS)</td></tr>
<tr><td>Supremacy of Constitution</td><td>Emergency provisions override federalism</td></tr>
<tr><td>Rigidity of amendment</td><td>Residuary powers with Parliament</td></tr>
<tr><td>Bicameralism (RS + LS)</td><td>Appointment of Governors by President</td></tr>
<tr><td>Financial independence of states</td><td>Parliament can change state boundaries</td></tr></table>
<div class='dt' style='margin-top:8px'><strong>Trap:</strong> India does NOT have dual citizenship unlike USA. <strong>Granville Austin</strong> called it "cooperative federalism."</div>`,
br:"Federal Structure · Art. 1"},

{n:"08",t:"History",tag:"Citizenship — Art. 5–11",ref:"Part II · Art. 5–11",
q:"How does Indian Constitution deal with Citizenship? Key provisions?",
a:`Part II (Art. 5–11): <span class='h'>Single citizenship</span>. Citizenship Act 1955 governs citizenship. India does NOT recognise <span class='h'>dual citizenship</span> (OCI card ≠ citizenship).`,
dt:`<strong>Art. 5:</strong> Citizenship at commencement — born in India, or parent born in India, or ordinarily resident for 5 years. <strong>Art. 11:</strong> Parliament has power to regulate citizenship by law. <strong>Citizenship (Amendment) Act 2019:</strong> Fast-track citizenship for non-Muslim minorities from Pakistan, Bangladesh, Afghanistan. Controversial. <strong>Trap:</strong> OCI = Overseas Citizen of India — NOT dual citizenship. Cannot vote, hold constitutional office.`,
bl:"Citizenship Key Facts",
bk:`<table class='ct'><tr><th>Article</th><th>Subject</th></tr>
<tr><td class='h'>Art. 5</td><td>Citizenship at commencement of Constitution</td></tr>
<tr><td class='h'>Art. 6</td><td>Rights of citizenship of migrants from Pakistan</td></tr>
<tr><td class='h'>Art. 7</td><td>Rights of citizenship of migrants to Pakistan (can regain)</td></tr>
<tr><td class='h'>Art. 8</td><td>Rights of citizenship of persons of Indian origin outside India</td></tr>
<tr><td class='h'>Art. 9</td><td>Persons voluntarily acquiring citizenship of foreign state are not citizens of India</td></tr>
<tr><td class='h'>Art. 10</td><td>Continuance of rights of citizenship</td></tr>
<tr><td class='h'>Art. 11</td><td>Parliament empowered to regulate citizenship by law</td></tr></table>
<div class='dt' style='margin-top:8px'><strong>Citizenship Act 1955:</strong> By birth, descent, registration, naturalisation, or incorporation of territory. <strong>CAA 2019:</strong> Amended Citizenship Act — added special fast-track provision for Hindu, Sikh, Buddhist, Jain, Parsi, Christian minorities from 3 countries.</div>`,
br:"Part II · Art. 5–11"},

// ══════════════════════════════════════════
// SCHEDULES (9–14)
// ══════════════════════════════════════════
{n:"09",t:"Schedules",tag:"Schedules 1–4",ref:"Constitution — Schedules",
q:"What do Schedules 1, 2, 3, and 4 of the Constitution contain?",
a:`Sch 1: <span class='h'>States & UTs</span> | Sch 2: <span class='h'>Salaries of key offices</span> | Sch 3: <span class='h'>Forms of Oaths</span> | Sch 4: <span class='h'>Allocation of Rajya Sabha seats</span>`,
dt:`<strong>Schedule 1:</strong> 28 States + 8 UTs listed. <strong>Schedule 2:</strong> Salaries of President, VP, CJI, SC judges, CAG, Governors, etc. <strong>Schedule 3:</strong> Oaths for President, VP, Ministers, MPs, SC/HC judges. <strong>Schedule 4:</strong> Allocation of seats in Rajya Sabha for each state/UT.`,
bl:"Schedules 1–4 Detail",
bk:`<table class='ct'><tr><th>Schedule</th><th>Subject</th><th>Key Trap</th></tr>
<tr><td class='h'>1st Schedule</td><td>Names of States and UTs + territories</td><td>28 States, 8 UTs as of 2020 (J&K split)</td></tr>
<tr><td class='h'>2nd Schedule</td><td>Emoluments of Constitutional offices</td><td>President, VP, Speaker, CJI, Governors, CAG</td></tr>
<tr><td class='h'>3rd Schedule</td><td>Forms of Oaths and Affirmations</td><td>Oath of office, oath of secrecy, oath of allegiance</td></tr>
<tr><td class='h'>4th Schedule</td><td>Allocation of seats in Rajya Sabha to States &amp; UTs</td><td>Max RS strength = 250 (238 elected + 12 nominated)</td></tr></table>
<div class='dt' style='margin-top:8px'><strong>Trap:</strong> Schedule 1 was amended when J&K was bifurcated into J&K (UT with legislature) + Ladakh (UT without legislature) in 2019 by J&K Reorganisation Act.<br><strong>Schedule 2 salaries charged to CFI</strong> — not voted upon in Parliament.</div>`,
br:"Constitution Schedules"},

{n:"10",t:"Schedules",tag:"Schedules 5–7",ref:"Constitution — Schedules",
q:"What do Schedules 5, 6, and 7 contain? What are the 3 Lists?",
a:`Sch 5: <span class='h'>Scheduled Areas & Tribes</span> | Sch 6: <span class='h'>Tribal areas (NE)</span> | Sch 7: <span class='h'>3 Lists (Union, State, Concurrent)</span>`,
dt:`<strong>Schedule 7 — The 3 Lists:</strong> Union List = 97 subjects (defence, foreign affairs, currency, railways) | State List = 66 subjects (police, agriculture, public health) | Concurrent List = 47 subjects (education, marriage, forests, labour). <strong>Trap:</strong> Education moved to Concurrent List by 42nd Amendment 1976.`,
bl:"Schedule 7 — 3 Lists Deep Dive",
bk:`<table class='ct'><tr><th>List</th><th>Subjects</th><th>No. of Entries</th><th>Who legislates</th></tr>
<tr><td class='h'>Union List (List I)</td><td>Defence, Foreign Affairs, Currency, Banking, Railways, Atomic Energy, Citizenship</td><td>97 entries</td><td>Parliament only</td></tr>
<tr><td class='h'>State List (List II)</td><td>Police, Agriculture, Public Health, Land, Irrigation, Local Govt, Markets</td><td>66 entries</td><td>State Legislature only</td></tr>
<tr><td class='h'>Concurrent List (List III)</td><td>Education, Marriage, Forests, Labour, Drugs, Criminal Law, Evidence</td><td>47 entries</td><td>Both — Centre prevails on repugnancy (Art. 254)</td></tr>
</table>
<div class='dt' style='margin-top:8px'><strong>Residuary powers:</strong> Not in any list → Parliament legislates (Art. 248 + Union List entry 97). <strong>Trap:</strong> Originally State List had 66 entries but some transferred to Concurrent List (e.g., Education — 42nd Amend.). Disputes between Centre and State on Concurrent List resolved in Parliament's favour.</div>`,
br:"Schedule 7 · Art. 246"},

{n:"11",t:"Schedules",tag:"Schedules 8–10",ref:"Constitution — Schedules",
q:"What do Schedules 8, 9, and 10 deal with?",
a:`Sch 8: <span class='h'>22 Official Languages</span> | Sch 9: <span class='h'>Laws beyond judicial review</span> (Kisan/land reform) | Sch 10: <span class='h'>Anti-Defection Law</span>`,
dt:`<strong>Schedule 8:</strong> Originally 14 languages, now 22. Includes Hindi, Bengali, Marathi, Tamil, Telugu, Urdu, Sanskrit, etc. <strong>Schedule 9:</strong> Added by 1st Amendment 1951 — protects land reform laws from FR challenges. But post-I.R. Coelho (2007) SC can review even Sch. 9 laws if they violate basic structure. <strong>Schedule 10:</strong> Added by 52nd Amendment 1985 — anti-defection.`,
bl:"Schedules 8–10 Deep Dive",
bk:`<table class='ct'><tr><th>Schedule</th><th>Subject</th><th>Key Note</th></tr>
<tr><td class='h'>8th Schedule</td><td>22 Official Languages</td><td>Hindi + 21 others. Latest additions: Bodo, Dogri, Maithili, Santhali (2003 by 92nd Amend.)</td></tr>
<tr><td class='h'>9th Schedule</td><td>Laws protected from judicial review</td><td>Added by 1st Amend 1951. Currently 284 laws listed. Post-I.R. Coelho 2007 — SC can review if violates basic structure.</td></tr>
<tr><td class='h'>10th Schedule</td><td>Anti-Defection provisions</td><td>Added by 52nd Amend 1985. Bars disqualification if 2/3 members merge. Speaker decides — but SC can review. Kihoto Hollohan case (1992) upheld it.</td></tr></table>
<div class='dt' style='margin-top:8px'><strong>22 languages in 8th Schedule:</strong> Assamese, Bengali, Bodo, Dogri, Gujarati, Hindi, Kannada, Kashmiri, Konkani, Maithili, Malayalam, Manipuri, Marathi, Nepali, Odia, Punjabi, Sanskrit, Santhali, Sindhi, Tamil, Telugu, Urdu.</div>`,
br:"Schedules 8–10 · Constitutional Law"},

{n:"12",t:"Schedules",tag:"Schedules 11–12",ref:"Constitution — Panchayati Raj",
q:"What do Schedules 11 and 12 deal with? Which Amendments added them?",
a:`Sch 11: <span class='h'>29 subjects for Panchayats</span> (73rd Amendment 1992) | Sch 12: <span class='h'>18 subjects for Municipalities</span> (74th Amendment 1992)`,
dt:`<strong>73rd Amendment:</strong> Added Art. 243A–243O + Schedule 11 — gave constitutional status to Panchayati Raj. 3-tier: Gram Panchayat → Panchayat Samiti → Zila Parishad. <strong>74th Amendment:</strong> Art. 243P–243ZG + Schedule 12 — urban local bodies. <strong>Trap:</strong> These amendments are not applicable to Scheduled Areas (5th Schedule) and tribal areas (6th Schedule) without extension.`,
bl:"73rd & 74th Amendments — PRIs",
bk:`<table class='ct'><tr><th>Feature</th><th>73rd Amendment (Panchayats)</th><th>74th Amendment (Municipalities)</th></tr>
<tr><td class='h'>Schedule</td><td>11th Schedule (29 subjects)</td><td>12th Schedule (18 subjects)</td></tr>
<tr><td class='h'>Articles added</td><td>Art. 243–243O</td><td>Art. 243P–243ZG</td></tr>
<tr><td class='h'>Structure</td><td>3-tier: Village→Block→District</td><td>Nagar Panchayat, Municipal Council, Municipal Corp</td></tr>
<tr><td class='h'>Reservation</td><td>1/3 seats for women (now 1/2 in many states)</td><td>1/3 seats for women</td></tr>
<tr><td class='h'>Election authority</td><td>State Election Commission</td><td>State Election Commission</td></tr>
<tr><td class='h'>Finance</td><td>State Finance Commission</td><td>State Finance Commission</td></tr></table>`,
br:"73rd & 74th Amendments"},

{n:"13",t:"Schedules",tag:"All 12 Schedules — Quick Reference",ref:"Constitution — All Schedules",
q:"What are all 12 Schedules of the Constitution — one-line each?",
a:`12 Schedules: <span class='h'>States/UTs · Salaries · Oaths · RS seats · Scheduled Areas · NE Tribal · 3 Lists · Languages · Sch-9 laws · Anti-Defection · Panchayat subjects · Municipal subjects</span>`,
dt:`<strong>Original Schedules:</strong> 8 Schedules in 1950. <strong>Added later:</strong> 9th (1951, 1st Amend.) | 10th (1985, 52nd Amend.) | 11th (1992, 73rd Amend.) | 12th (1992, 74th Amend.). <strong>Trap:</strong> Only 12 Schedules exist — no 13th Schedule. Some students confuse this.`,
bl:"All 12 Schedules",
bk:`<table class='ct'><tr><th>Sch.</th><th>Content</th><th>Added By</th></tr>
<tr><td class='h'>1</td><td>Names of 28 States + 8 UTs</td><td>Original</td></tr>
<tr><td class='h'>2</td><td>Salaries of President, VP, Speaker, CJI, Governors, CAG</td><td>Original</td></tr>
<tr><td class='h'>3</td><td>Forms of Oaths &amp; Affirmations</td><td>Original</td></tr>
<tr><td class='h'>4</td><td>Allocation of Rajya Sabha seats</td><td>Original</td></tr>
<tr><td class='h'>5</td><td>Scheduled Areas and Scheduled Tribes (Centre-controlled)</td><td>Original</td></tr>
<tr><td class='h'>6</td><td>Tribal Areas of Assam, Meghalaya, Tripura, Mizoram</td><td>Original</td></tr>
<tr><td class='h'>7</td><td>Three Legislative Lists (Union, State, Concurrent)</td><td>Original</td></tr>
<tr><td class='h'>8</td><td>22 Official Languages</td><td>Original (14 → 22)</td></tr>
<tr><td class='h'>9</td><td>Land reform + other laws protected from JR (284 laws)</td><td>1st Amend. 1951</td></tr>
<tr><td class='h'>10</td><td>Anti-Defection Law</td><td>52nd Amend. 1985</td></tr>
<tr><td class='h'>11</td><td>29 functions of Panchayats</td><td>73rd Amend. 1992</td></tr>
<tr><td class='h'>12</td><td>18 functions of Municipalities</td><td>74th Amend. 1992</td></tr></table>`,
br:"All 12 Schedules"},
